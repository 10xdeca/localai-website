  <text x="68" y="240" font-family="Orbitron, monospace" font-size="76" font-weight="700" fill="#077a6e">localAI</text>
  <text x="68" y="346" font-family="Orbitron, monospace" font-size="92" font-weight="900" fill="#04a893">Catchup</text>
