    <path d="M 0,-80 L 69.3,-40 L 69.3,40 L 0,80 L -69.3,40 L -69.3,-40 Z" fill="none" stroke="#077a6e" stroke-opacity="0.4" stroke-width="2"/>
    <circle cx="0" cy="0" r="11" fill="#077a6e"/>
    <circle cx="108" cy="-52" r="8" fill="#077a6e" fill-opacity="0.85"/>
    <circle cx="-122" cy="20" r="8" fill="#077a6e" fill-opacity="0.85"/>
    <circle cx="58" cy="134" r="8" fill="#077a6e" fill-opacity="0.85"/>
    <circle cx="-72" cy="-122" r="7" fill="#077a6e" fill-opacity="0.7"/>
    <line x1="0" y1="0" x2="108" y2="-52" stroke="#077a6e" stroke-opacity="0.4" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-122" y2="20" stroke="#077a6e" stroke-opacity="0.4" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="58" y2="134" stroke="#077a6e" stroke-opacity="0.4" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-72" y2="-122" stroke="#077a6e" stroke-opacity="0.3" stroke-width="1.5"/>
  </g>

