    <path id="sailB" d="M -95.14,-77.46 C -112.67,-87.95 -149.82,-93.42 -170.00,-92.16 c 15.09,18.16 40.35,50.37 53.01,77.70 C -111.39,-28.46 -98.78,-65.04 -95.14,-77.46 Z" fill="#077a6e" fill-opacity="0.04" stroke="#077a6e" stroke-opacity="0.28" stroke-width="2"/>
    <path id="sailA" d="M -23.58,-99.39 c -23.25,-17.36 -68.53,-25.12 -101.36,-22.86 c 28.00,29.90 68.82,113.50 72.80,122.27 C -39.97,-24.27 -25.57,-86.69 -23.58,-99.39 Z" fill="#077a6e" fill-opacity="0.05" stroke="#077a6e" stroke-opacity="0.34" stroke-width="2"/>
    <path id="sailC" d="M 94.82,-84.37 c 0.69,-0.54 1.38,-1.06 2.06,-1.60 C 61.90,-128.13 12.80,-168.53 -60.05,-181.26 c 17.62,24.83 54.75,122.53 71.01,181.26 C 38.66,-23.17 79.68,-69.70 94.82,-84.37 Z" fill="#077a6e" fill-opacity="0.06" stroke="#077a6e" stroke-opacity="0.4" stroke-width="2"/>
    <path id="sailD" d="M 216.66,-120.93 c -53.34,-1.02 -83.17,6.82 -119.78,34.98 c 24.14,29.12 41.57,59.06 55.44,81.41 C 176.02,-64.66 194.80,-91.38 216.66,-120.93 Z" fill="#077a6e" fill-opacity="0.08" stroke="#077a6e" stroke-opacity="0.48" stroke-width="2"/>

    <line x1="-185" y1="0" x2="221" y2="0" stroke="#077a6e" stroke-opacity="0.25" stroke-width="2"/>

    <g transform="scale(1,-0.42)" opacity="0.18">
      <use href="#sailB"/>
      <use href="#sailA"/>
      <use href="#sailC"/>
      <use href="#sailD"/>
    </g>

    <ellipse cx="35" cy="16" rx="32" ry="9" fill="none" stroke="#077a6e" stroke-opacity="0.32" stroke-width="1.5"/>
    <ellipse cx="35" cy="16" rx="62" ry="17" fill="none" stroke="#077a6e" stroke-opacity="0.22" stroke-width="1.5"/>
    <ellipse cx="35" cy="16" rx="94" ry="26" fill="none" stroke="#077a6e" stroke-opacity="0.13" stroke-width="1.5"/>

    <line x1="35" y1="16" x2="-80" y2="24" stroke="#077a6e" stroke-opacity="0.4" stroke-width="1.5"/>
    <line x1="35" y1="16" x2="165" y2="28" stroke="#077a6e" stroke-opacity="0.4" stroke-width="1.5"/>
    <circle cx="35" cy="16" r="8" fill="#077a6e"/>
    <circle cx="-80" cy="24" r="7" fill="#077a6e" fill-opacity="0.85"/>
    <circle cx="165" cy="28" r="7" fill="#077a6e" fill-opacity="0.85"/>
