  <text x="72" y="132" font-family="'Share Tech Mono', monospace" font-size="26" letter-spacing="0.2em" fill="#077a6e" fill-opacity="0.7">LOCAL AI &#8226; MEETUP</text>

  <!-- Title (single colour, edge to edge) -->
  <text x="68" y="252" font-family="Orbitron, monospace" font-size="100" font-weight="700" fill="#077a6e">localAI Catchup</text>
  <text x="68" y="366" font-family="Orbitron, monospace" font-size="100" font-weight="700" fill="#077a6e">Sydney #1</text>

  <!-- Divider -->
  <line x1="72" y1="410" x2="600" y2="410" stroke="#077a6e" stroke-opacity="0.35" stroke-width="3"/>

  <!-- Details (bigger) -->
  <text x="72" y="490" font-family="'Plus Jakarta Sans', sans-serif" font-size="54" font-weight="800" fill="#0a3330">Sunday, 19th July</text>
  <text x="72" y="550" font-family="'Plus Jakarta Sans', sans-serif" font-size="54" font-weight="800" fill="#0a3330">2026</text>
  <text x="72" y="612" font-family="'Plus Jakarta Sans', sans-serif" font-size="48" font-weight="700" fill="#04a893">1:00 PM &#8211; 3:00 PM</text>
  <text x="72" y="676" font-family="'Plus Jakarta Sans', sans-serif" font-size="44" font-weight="800" fill="#0a3330">ICC Sydney</text>
  <text x="72" y="722" font-family="'Plus Jakarta Sans', sans-serif" font-size="36" font-weight="600" fill="#0a4a44">14 Darling Dr, Sydney NSW 2000</text>

  <!-- Domain link -->
  <text x="1008" y="1032" text-anchor="end" font-family="'Plus Jakarta Sans', sans-serif" font-size="24" font-weight="600" fill="#077a6e" fill-opacity="0.65">localai.xdeca.com</text>
