<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&amp;family=Plus+Jakarta+Sans:wght@400;600;700&amp;family=Share+Tech+Mono&amp;display=swap');
    </style>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eef8f6"/>
      <stop offset="1" stop-color="#dcf0ec"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M 46 0 L 0 0 0 46" fill="none" stroke="#077a6e" stroke-opacity="0.14" stroke-width="1"/>
    </pattern>
    <radialGradient id="ringFade" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#077a6e" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#077a6e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGrad)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Right-side radar / gathering motif -->
  <g transform="translate(960,300)">
    <circle r="230" fill="url(#ringFade)"/>
    <path d="M 0,-190 L 164.5,-95 L 164.5,95 L 0,190 L -164.5,95 L -164.5,-95 Z" fill="none" stroke="#077a6e" stroke-opacity="0.3" stroke-width="2"/>
    <path d="M 0,-130 L 112.6,-65 L 112.6,65 L 0,130 L -112.6,65 L -112.6,-65 Z" fill="none" stroke="#077a6e" stroke-opacity="0.35" stroke-width="2"/>
    <path d="M 0,-70 L 60.6,-35 L 60.6,35 L 0,70 L -60.6,35 L -60.6,-35 Z" fill="none" stroke="#077a6e" stroke-opacity="0.4" stroke-width="2"/>
    <circle cx="0" cy="0" r="10" fill="#077a6e"/>
    <circle cx="96" cy="-46" r="7" fill="#077a6e" fill-opacity="0.85"/>
    <circle cx="-108" cy="18" r="7" fill="#077a6e" fill-opacity="0.85"/>
    <circle cx="52" cy="118" r="7" fill="#077a6e" fill-opacity="0.85"/>
    <circle cx="-64" cy="-108" r="6" fill="#077a6e" fill-opacity="0.7"/>
    <circle cx="150" cy="60" r="5" fill="#077a6e" fill-opacity="0.6"/>
    <line x1="0" y1="0" x2="96" y2="-46" stroke="#077a6e" stroke-opacity="0.4" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-108" y2="18" stroke="#077a6e" stroke-opacity="0.4" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="52" y2="118" stroke="#077a6e" stroke-opacity="0.4" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-64" y2="-108" stroke="#077a6e" stroke-opacity="0.3" stroke-width="1.5"/>
  </g>

  <!-- Frame accent -->
  <rect x="24" y="24" width="1152" height="552" fill="none" stroke="#077a6e" stroke-opacity="0.25" stroke-width="2"/>

  <!-- Eyebrow -->
  <text x="80" y="118" font-family="'Share Tech Mono', monospace" font-size="22" letter-spacing="0.18em" fill="#077a6e" fill-opacity="0.7">LOCAL AI &#8226; MEETUP</text>

  <!-- Title -->
  <text x="80" y="196" font-family="Orbitron, monospace" font-size="50" font-weight="700" fill="#077a6e">localAI Catchup</text>
  <text x="80" y="256" font-family="Orbitron, monospace" font-size="50" font-weight="700" fill="#077a6e">Canberra</text>

  <!-- Divider -->
  <line x1="80" y1="298" x2="440" y2="298" stroke="#077a6e" stroke-opacity="0.35" stroke-width="2"/>

  <!-- Details -->
  <text x="80" y="360" font-family="'Plus Jakarta Sans', sans-serif" font-size="36" font-weight="700" fill="#0a3330">Saturday, 18th July 2026</text>
  <text x="80" y="406" font-family="'Plus Jakarta Sans', sans-serif" font-size="34" font-weight="600" fill="#0a4a44">1:00 PM &#8211; 3:00 PM</text>
  <text x="80" y="458" font-family="'Plus Jakarta Sans', sans-serif" font-size="30" font-weight="700" fill="#0a3330">CMAG Cafe</text>
  <text x="80" y="494" font-family="'Plus Jakarta Sans', sans-serif" font-size="28" font-weight="600" fill="#0a4a44">176 London Cct, Canberra ACT 2601</text>

  <!-- Domain link -->
  <text x="1120" y="548" text-anchor="end" font-family="'Plus Jakarta Sans', sans-serif" font-size="22" font-weight="600" fill="#077a6e" fill-opacity="0.65">localai.xdeca.com</text>
